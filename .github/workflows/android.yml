name: Android Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  generate-starship-otr:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ninja-build cmake g++ gcc libzip-dev zipcmp zipmerge ziptool libgl1-mesa-dev wget unzip libsdl2-dev libtinyxml2-dev curl

      - name: Download nlohmann_json header
        run: |
          mkdir -p external/nlohmann_json/include/nlohmann
          curl -L https://raw.githubusercontent.com/nlohmann/json/v3.11.3/single_include/nlohmann/json.hpp \
            -o external/nlohmann_json/include/nlohmann/json.hpp

      - name: Build libultraship (for OTR/data)
        run: |
          cmake -H. -Bbuild-libultra -DCMAKE_INCLUDE_PATH=${GITHUB_WORKSPACE}/external/nlohmann_json/include
          cmake --build build-libultra -- -j$(nproc)

      - name: Build asset tools (mio0, recomp)
        run: make -C tools mio0 recomp

      - name: Build Torch (CMake)
        run: |
          cmake -S tools/Torch -B tools/Torch/cmake-build-release -GNinja -DCMAKE_BUILD_TYPE=Release
          cmake --build tools/Torch/cmake-build-release --target torch -j$(nproc)

      - name: Generate starship.o2r
        run: tools/Torch/cmake-build-release/torch pack port starship.o2r o2r

      - uses: actions/upload-artifact@v4
        with:
          name: starship.o2r
          path: starship.o2r
          retention-days: 1

  build-android:
    needs: generate-starship-otr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install ninja-build
        run: sudo apt-get install -y ninja-build

      - name: Download starship.o2r
        uses: actions/download-artifact@v4
        with:
          name: starship.o2r
          path: Android/app/src/main/assets

      - name: Grant execute permission for gradlew
        working-directory: Android
        run: chmod +x ./gradlew

      - name: Build Starship APK
        working-directory: Android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: starship-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
