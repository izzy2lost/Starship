name: Build Starship Android Libraries

on: 
  workflow_dispatch:

jobs:
  build:
    name: Build libstarship.so for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Starship repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up NDK environment
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip -d $HOME
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25b" >> $GITHUB_ENV

      - name: Build for arm64-v8a
        run: |
          mkdir -p build/android-arm64 && cd build/android-arm64
          cmake ../.. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --target starship -j$(nproc)

      - name: Build for armeabi-v7a
        run: |
          mkdir -p build/android-armv7 && cd build/android-armv7
          cmake ../.. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --target starship -j$(nproc)

      - name: Upload .so files
        uses: actions/upload-artifact@v4
        with:
          name: libstarship
          path: |
            build/android-arm64/libstarship.so
            build/android-armv7/libstarship.so
