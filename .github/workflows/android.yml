name: Android Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt-get install -y ninja-build      

      - name: Download starship.o2r
        uses: actions/download-artifact@v4
        with:
          name: starship.o2r
          path: Android/app/src/main/assets

      - name: Configure Gradle permissions
        run: chmod +x Android/gradlew
          
      - name: Build APK
        run: |
          cd Android
          ./gradlew assembleDebug -P elfBuildType=RelWithDebInfo
          mv app/build/outputs/apk/release/app-release.apk ../starship.apk
    
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: starship-apk
          path: starship.apk
