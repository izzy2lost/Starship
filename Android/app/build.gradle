plugins {
    id 'com.android.application'
}

android {
    compileSdkVersion rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion

    defaultConfig {
        applicationId "com.starship.android"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "0.1-alpha"
        
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared",
                          "-DSTARSHIP_BUILD_ANDROID=ON",
                          "-DANDROID_PLATFORM=android-24"
                cppFlags "-std=c++17 -frtti -fexceptions"
                abiFilters 'armeabi-v7a', 'arm64-v8a'
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
            jniDebuggable true
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        prefab true
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version rootProject.ext.cmakeVersion
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        resources {
            excludes += ['META-INF/*']
        }
    }
}

dependencies {
    implementation "com.github.Waterdish:libultraship:$rootProject.ext.libultrashipVersion"
    implementation "org.joml:joml-android:$rootProject.ext.jomlVersion"
    implementation "androidx.games:games-activity:$rootProject.ext.glesVersion"
    implementation 'androidx.core:core:1.10.1'
    implementation 'com.google.android.gms:play-services-games:23.1.0'
}